name: Run parse_jwst_schedule.py

on:
  workflow_dispatch:
  schedule:
    # https://crontab.guru/#40_9_*_*_0
    # Run at 03:00 UTC on MWF to catch schedule updates
    - cron: "45 05 * * 1,3,5,6"
      timezone: "Europe/Berlin"

jobs:
  UpdateJWSTSchedule:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Build python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip' # caching pip dependencies
      - run: pip install -r requirements.txt

      - name: Run script
        shell: bash
        run: cd assets/schedule; python parse_jwst_schedule.py

      - name: Commit changes
        uses: EndBug/add-and-commit@v10
        with:
          default_author: github_actions
          message: 'Update JWST schedules from the GH Action'